services:
  shredhills-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shredhills-dev
    restart: unless-stopped
    ports:
      - "3010:80"
    environment:
      - REACT_APP_FIREBASE_API_KEY=${REACT_APP_FIREBASE_API_KEY}
      - REACT_APP_FIREBASE_AUTH_DOMAIN=${REACT_APP_FIREBASE_AUTH_DOMAIN}
      - REACT_APP_FIREBASE_PROJECT_ID=${REACT_APP_FIREBASE_PROJECT_ID}
      - REACT_APP_FIREBASE_STORAGE_BUCKET=${REACT_APP_FIREBASE_STORAGE_BUCKET}
      - REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
      - REACT_APP_FIREBASE_APP_ID=${REACT_APP_FIREBASE_APP_ID}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shredhills-dev.rule=Host(`${SHREDHILLS_DOMAIN}`)"
      - "traefik.http.routers.shredhills-dev.entrypoints=https"
      - "traefik.http.routers.shredhills-dev.tls=true"
      - "traefik.http.services.shredhills-dev.loadbalancer.server.port=80"
    networks:
      - qcav-network1

networks:
  qcav-network1:
    external: true

